version: "3.9"

services:
  juggle:
    build:
      context: .
      dockerfile: Dockerfile
    image: juggle-net8:latest
    container_name: juggle
    restart: unless-stopped
    ports:
      - "9127:9127"          # 宿主机端口:容器端口，可改为 "8080:9127" 等
    volumes:
      - juggle_data:/data     # SQLite 数据库持久化
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:9127
      - DB_PATH=/data/juggle.db
      # 如需自定义 JWT 密钥，在此覆盖：
      # - Jwt__Key=your-super-secret-key-min-32-chars
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9127/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  juggle_data:
    driver: local
